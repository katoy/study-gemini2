name: CI

on:
  push:
    branches: [ main, dialog ]
  pull_request:
    branches: [ main, dialog ]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.2'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Run ruff lint
      run: uv run ruff check .

    - name: Run mypy type check
      run: uv run mypy . --ignore-missing-imports

  tests:
    name: Tests and Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.2'

    - name: Install uv and Xvfb
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Cache uv packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Run tests with coverage and GUI integration (Xvfb)
      run: |
        xvfb-run -a sh -c 'uv run pytest tests/ --cov=. --cov-report=term-missing --cov-report=json --cov-config=.coveragerc && uv run python scripts/test_gui_init.py'

    - name: Check coverage (GUI excluded - must be 100%)
      run: |
        uv run pytest --cov=. --cov-report=term-missing:skip-covered \
          --ignore=tests/test_gui.py \
          --ignore=tests/test_gui_regression.py \
          --ignore=tests/test_gui_width.py \
          -q

        # カバレッジ 100% を確認
        COVERAGE=$(uv run pytest --cov=. --cov-report=json \
          --ignore=tests/test_gui.py \
          --ignore=tests/test_gui_regression.py \
          --ignore=tests/test_gui_width.py \
          -q 2>&1 | grep -o '"percent_covered": [0-9.]*' | grep -o '[0-9.]*')

        if [ "$COVERAGE" != "100.0" ]; then
          echo "❌ Coverage is ${COVERAGE}%, expected 100% (excluding GUI tests)"
          exit 1
        fi
        echo "✅ Coverage is 100% (excluding GUI tests)"

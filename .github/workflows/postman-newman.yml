name: Postman Newman Tests

on:
  push:
    branches: [ main, dialog, work ]
  pull_request:
    branches: [ main, dialog ]

jobs:
  postman-tests:
    name: Run Postman/Newman external API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reversi-py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.2'

      - name: Install uv helper
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('reversi-py/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies (server)
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi uvicorn pydantic requests

      - name: Cache Node.js (npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('reversi-py/tests/postman/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm ci --prefix tests/postman

      - name: Start API server
        run: |
          python -m uvicorn server.api_server:app --host 127.0.0.1 --port 5001 --log-level warning &
          echo $! > server.pid
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 5001 && break
            sleep 1
          done

      - name: Run Newman collection
        run: npx newman run tests/postman/reversi-api.postman_collection.fixed.json -e tests/postman/reversi-api.postman_environment.json --timeout-request 20000 --reporters cli,junit --reporter-junit-export tests/postman/newman-results.xml

      - name: Upload Newman JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: tests/postman/newman-results.xml

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi
